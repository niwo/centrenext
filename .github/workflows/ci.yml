name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CENTRENEXT_CONTENT_REPO_DIR: ${{ github.workspace }}/centrebienetre-content

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure content repo token exists
        run: |
          if [ -z "${{ secrets.CONTENT_REPO_TOKEN }}" ]; then
            echo "::error::Missing required secret CONTENT_REPO_TOKEN (needs read access to niwo/centrebienetre-content)."
            exit 1
          fi

      - name: Checkout content repository
        uses: actions/checkout@v4
        with:
          repository: niwo/centrebienetre-content
          ref: main
          path: centrebienetre-content
          token: ${{ secrets.CONTENT_REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate content files
        run: npm run validate:content

      - name: Build
        run: npm run build