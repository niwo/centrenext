    title: Workshop Faszientherapie im Mai
    excerpt: Im Mai findet ein praxisnaher Workshop zur Faszientherapie statt.
    content: |
      Im Mai bieten wir einen halbtaegigen Workshop zur Faszientherapie an. Teilnehmende lernen grundlegende Techniken zur Selbstbehandlung kennen.

      Der Workshop richtet sich an alle, die mehr ueber die Bedeutung gesunder Faszien fuer Beweglichkeit und Schmerzfreiheit erfahren moechten.
  fr:
    slug: 2026-03-10-atelier-therapie-fasciale
    title: Atelier therapie fasciale en mai
    excerpt: Un atelier pratique sur la therapie fasciale aura lieu en mai.
    content: |
      En mai, nous proposons un atelier d'une demi-journee consacre a la therapie fasciale. Les participants decouvriront des techniques de base pour l'auto-traitement.

      Cet atelier s'adresse a toute personne souhaitant en savoir plus sur l'importance de fascias sains pour la mobilite et le soulagement des douleurs.
