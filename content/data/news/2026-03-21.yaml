    title: Neue Website in Vorbereitung
    excerpt: Das neue Frontend wird auf statische Auslieferung, gute Wartbarkeit und zweisprachige Inhalte ausgelegt.
    content: |
      Wir bauen den digitalen Auftritt der Praxis schrittweise neu auf. Die Inhalte bleiben lokal versioniert und koennen pro Sprache separat gepflegt werden.

      In den naechsten Schritten folgen optimierte Team- und Angebotsseiten sowie weitere News-Beitraege in derselben Struktur.
