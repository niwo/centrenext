    title: Nouvelle presence web en construction
    excerpt: Le projet vise une publication statique, une maintenance locale et une disponibilite immediate en deux langues.
    content: |
      Le cabinet renouvelle progressivement sa presence en ligne. Les contenus restent versionnes localement et sont maintenus de maniere claire pour chaque langue.

      Les prochaines etapes incluent des pages enrichies pour l'equipe, les prestations et les actualites.
