    slug: 2026-03-14-erweiterte-terminzeiten
    title: Erweiterte Terminzeiten am Donnerstag
    excerpt: Fuer Berufstaetige sind ab April spaetere Termine verfuegbar.
    content: |
      Ab April erweitert die Praxis die Verfuegbarkeit am Donnerstagabend. Damit werden zusaetzliche Termine ausserhalb klassischer Arbeitszeiten moeglich.

      Die konkrete Verfuegbarkeit ist wie gewohnt direkt bei der Terminvereinbarung einsehbar.
  fr:
    slug: 2026-03-14-horaires-etendus
    title: Horaires etendus le jeudi
    excerpt: Des plages de rendez-vous supplementaires seront proposees des le mois d'avril.
    content: |
      Des avril, le cabinet proposera des creneaux supplementaires le jeudi en fin de journee. Cette extension facilite la prise en charge pour les personnes actives.

      Les disponibilites exactes restent visibles lors de la prise de rendez-vous.
