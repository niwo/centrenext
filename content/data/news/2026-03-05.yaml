    title: Laufanalyse neu im Angebot
    excerpt: Ab sofort bieten wir professionelle Laufanalysen fuer Sportlerinnen und Sportler an.
    content: |
      Unsere neue Laufanalyse hilft dabei, Bewegungsmuster zu erkennen und gezielt zu verbessern. Das Angebot richtet sich an Laufsportlerinnen und Laufsportler aller Niveaus.

      Die Analyse umfasst eine Videoauswertung sowie individuelle Empfehlungen fuer Training und Praevention.
  fr:
