    title: Analyse de course desormais disponible
    excerpt: Nous proposons desormais des analyses de course professionnelles pour les sportifs.
    content: |
      Notre nouvelle analyse de course permet d'identifier les schemas de mouvement et de les ameliorer de maniere ciblee. Cette prestation s'adresse aux coureurs de tous niveaux.

      L'analyse comprend une evaluation video ainsi que des recommandations individuelles pour l'entrainement et la prevention.
