  content: |
    ### Centre bien-être a Bienne

    Au Centre bien-être, le bien-être reste au coeur de la prise en charge. Le cabinet reunit physiotherapie, nutrition et coaching dans un cadre calme et humain.

    - Accompagnement personnalise
    - Vision globale du mouvement et de la sante
    - Offre multidisciplinaire sous un meme toit
