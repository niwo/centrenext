profile:
  de:
    title: Praeventive Bewegungstherapie
    description: Gezieltes Training zur Vorbeugung von Beschwerden im Alltag und Beruf.
    content: |
      Die praeventive Bewegungstherapie setzt auf einfache, regelmaessige Uebungen mit direktem Alltagsbezug.

      Im Zentrum stehen Haltung, Belastungssteuerung und ein nachhaltiger Umgang mit koerperlichen Ressourcen.
  fr:
    title: Therapie preventive du mouvement
    description: Entrainement cible pour prevenir les douleurs au quotidien et au travail.
    content: |
      La therapie preventive du mouvement repose sur des exercices simples, progressifs et directement applicables.

      L'accent est mis sur la posture, la gestion des charges et l'autonomie sur le long terme.
