id: reha
profile:
  de:
    title: Funktionelle Rehabilitation
    description: Zielgerichtete Rueckkehr in Beruf, Sport und Alltag mit klaren Therapieetappen.
    content: |
      Die funktionelle Rehabilitation begleitet den Wiedereinstieg nach Verletzungen oder Operationen.

      Gemeinsam werden Etappenziele definiert, Fortschritte laufend ueberprueft und Belastung schrittweise gesteigert.
  fr:
    title: Reeducation fonctionnelle
    description: Retour progressif au travail, au sport et aux activites quotidiennes.
    content: |
      La reeducation fonctionnelle accompagne la reprise apres une blessure ou une intervention.

      Le suivi se base sur des etapes claires, un controle regulier des progres et une augmentation progressive des charges.
