id: coaching
profile:
  de:
    title: Beratung und Coaching
    description: Individuelle Begleitung zu Haltung, Bewegung im Alltag und eigenstaendigem Ueben.
    content: |
      Im Coaching werden belastende Bewegungsmuster analysiert und alltagstaugliche Strategien entwickelt.

      Ziel ist, Beschwerden langfristig zu reduzieren und die Selbstwirksamkeit durch klare, einfache Schritte zu staerken.
  fr:
    title: Conseil et coaching
    description: Accompagnement personnalise autour du mouvement, de la posture et des exercices autonomes.
    content: |
      Le coaching permet d'identifier les habitudes qui entretiennent les tensions et de mettre en place des solutions concretes.

      L'objectif est de reduire durablement les douleurs et de renforcer l'autonomie dans la gestion du corps.
