      Christa exerce la physiotherapie depuis plus de 15 ans. Elle est diplomee
      en physiotherapie du sport depuis 2008.


      En plus de la physiotherapie classique, elle utilise des techniques osteopathiques et fasciales et propose egalement des coachings Psych-K.
